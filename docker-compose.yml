services:
  mysql:
    image: mysql:8.4
    container_name: repairnote-mysql
    environment:
      MYSQL_DATABASE: repairnote
      MYSQL_USER: repairnote
      MYSQL_PASSWORD: repairnote
      MYSQL_ROOT_PASSWORD: repairnote-root
    ports:
      - "3308:3306"
    volumes:
      - repairnote-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  repairnote-mysql-data:
